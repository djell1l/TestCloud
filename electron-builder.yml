appId: com.testcloud.app
productName: TestCloud
copyright: Copyright © 2025 TestCloud contributors

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - package.json

icon: resources/icon.ico

win:
  icon: resources/icon.ico
  requestedExecutionLevel: asInvoker
  target:
    - target: portable
      arch: [x64]

portable:
  artifactName: TestCloud-${version}-portable-win-x64.exe

publish:
  provider: github
  owner: TON_USERNAME
  repo: TestCloud

mac:
  icon: resources/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]

linux:
  icon: resources/icon.png
  target:
    - target: AppImage
      arch: [x64]
